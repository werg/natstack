<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NatStack Bootstrap</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #101114;
        color: #f4f4f5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        width: min(720px, calc(100vw - 48px));
      }
      h1 {
        font-size: 18px;
        font-weight: 650;
        margin: 0 0 8px;
      }
      p {
        color: #a1a1aa;
        line-height: 1.5;
        margin: 0 0 18px;
      }
      .approval {
        border: 1px solid #3f3f46;
        background: #18181b;
        padding: 16px;
        border-radius: 8px;
      }
      .approval + .approval {
        margin-top: 12px;
      }
      .tools {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .title {
        font-weight: 650;
        margin-bottom: 6px;
      }
      .meta {
        color: #d4d4d8;
        font-size: 13px;
        margin-bottom: 12px;
      }
      button {
        border: 1px solid #52525b;
        background: #27272a;
        color: #fafafa;
        border-radius: 6px;
        padding: 8px 12px;
        font: inherit;
        margin: 0;
      }
      button.primary {
        background: #f59e0b;
        border-color: #f59e0b;
        color: #18181b;
      }
      button.danger {
        background: #7f1d1d;
        border-color: #991b1b;
      }
      .empty {
        border: 1px dashed #3f3f46;
        color: #a1a1aa;
        padding: 18px;
        border-radius: 8px;
      }
      .workspace-row {
        display: flex;
        gap: 8px;
      }
      input,
      select {
        min-width: 0;
        flex: 1;
        border: 1px solid #52525b;
        background: #18181b;
        color: #fafafa;
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
      }
      pre {
        max-height: 220px;
        overflow: auto;
        white-space: pre-wrap;
        border: 1px solid #3f3f46;
        background: #09090b;
        border-radius: 8px;
        padding: 12px;
        color: #d4d4d8;
        font-size: 12px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NatStack Recovery</h1>
      <p>
        Approve trusted workspace units or leave this window open while the workspace shell starts.
      </p>
      <section id="approvals" class="empty">Checking pending approvals...</section>
      <section class="tools">
        <div class="toolbar">
          <button id="reseed-shell">Reseed Shell</button>
          <button id="show-logs">Show Logs</button>
          <button id="open-workspace">Open Workspace</button>
          <select id="workspace-select" aria-label="Workspace"></select>
          <button id="switch-workspace">Switch</button>
        </div>
        <div class="workspace-row">
          <input id="workspace-name" placeholder="New workspace name" />
          <button id="create-workspace">Create</button>
        </div>
        <pre id="recovery-output" hidden></pre>
      </section>
    </main>
    <script type="module" src="./bootstrap/index.js"></script>
  </body>
</html>
