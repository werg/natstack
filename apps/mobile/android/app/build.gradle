apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// Apply google-services only when the JSON exists locally. Devs without
// Firebase can copy google-services.template.json to google-services.json.
if (file("google-services.json").exists()) {
    apply plugin: "com.google.gms.google-services"
}

/**
 * React Native Gradle Plugin configuration.
 * https://github.com/facebook/react-native/tree/main/packages/react-native-gradle-plugin
 */
react {
    // This app lives in a hoisted monorepo, so React Native and Codegen come
    // from the workspace root instead of apps/mobile/node_modules.
    reactNativeDir = rootProject.file("../../../node_modules/react-native")
    codegenDir = rootProject.file("../../../node_modules/@react-native/codegen")
    cliFile = rootProject.file("../../../node_modules/react-native/cli.js")
    hermesCommand = rootProject.file("../../../node_modules/react-native/sdks/hermesc/%OS-BIN%/hermesc").absolutePath

    // Autolinking configuration
    autolinkLibrariesWithApp()
}

android {
    namespace "com.natstack.mobile"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.natstack.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "0.1.0"
    }

    signingConfigs {
        if (project.hasProperty('RELEASE_STORE_FILE')) {
            release {
                storeFile file(RELEASE_STORE_FILE)
                storePassword RELEASE_STORE_PASSWORD
                keyAlias RELEASE_KEY_ALIAS
                keyPassword RELEASE_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            buildConfigField "boolean", "REACT_NATIVE_DEV_SUPPORT", "true"
        }
        internal {
            initWith debug
            matchingFallbacks = ["debug"]
            applicationIdSuffix ".internal"
            versionNameSuffix "-internal"
            signingConfig signingConfigs.debug
            debuggable true
            buildConfigField "boolean", "REACT_NATIVE_DEV_SUPPORT", "false"
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig project.hasProperty('RELEASE_STORE_FILE') ? signingConfigs.release : signingConfigs.debug
            buildConfigField "boolean", "REACT_NATIVE_DEV_SUPPORT", "false"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    // React Native framework
    implementation("com.facebook.react:react-android")

    // Hermes JS engine
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
