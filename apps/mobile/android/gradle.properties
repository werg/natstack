# Project-wide Gradle settings for NatStack Android

# JVM memory for the Gradle daemon
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# Android X migration
android.useAndroidX=true

# Use Hermes JS engine (default for RN 0.79+)
hermesEnabled=true

# React Native New Architecture (opt-in)
newArchEnabled=false

# JSC flavor (fallback if Hermes is disabled)
jscFlavor=org.webkit:android-jsc:+

# Parallel builds
org.gradle.parallel=true

# Configure builds
org.gradle.configuration-cache=true

# Kotlin code style
kotlin.code.style=official
