name: Build Mobile APK

on:
  push:
    branches: [main]
    tags: ['mobile-v*']
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/rpc/**'
      - 'packages/shared/**'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-mobile-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-mobile-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: pnpm install

      - name: Link node_modules for Gradle
        run: |
          # Gradle resolves node_modules from apps/mobile/android/ via
          # settings.gradle path: ../node_modules = apps/mobile/node_modules/
          # pnpm hoisted may not put all deps there, so symlink to root.
          if [ ! -L apps/mobile/node_modules ]; then
            rm -rf apps/mobile/node_modules
            ln -s ../../node_modules apps/mobile/node_modules
          fi

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Set up release signing
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # We deliberately only write the keystore file and the
          # NON-SECRET RELEASE_STORE_FILE / RELEASE_KEY_ALIAS pointers to
          # gradle.properties. The two passwords are passed to Gradle via
          # ORG_GRADLE_PROJECT_* env vars on the build step itself, so
          # they never hit disk and cannot be read by a subsequent
          # compromised step (e.g. a tag-moved upload action) that
          # inherits the workspace.
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            echo "No release keystore configured, will build debug APK"
          else
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
            echo "$KEYSTORE_BASE64" | base64 -d > apps/mobile/android/app/release.keystore
            echo "RELEASE_STORE_FILE=release.keystore" >> apps/mobile/android/gradle.properties
            echo "RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> apps/mobile/android/gradle.properties
          fi

      - name: Build release APK
        # Passwords are injected via ORG_GRADLE_PROJECT_* so Gradle picks
        # them up as project properties (`RELEASE_STORE_PASSWORD`,
        # `RELEASE_KEY_PASSWORD`) without touching gradle.properties.
        # TODO(security-audit-agent-5): apps/mobile/android/app/build.gradle
        # currently reads `RELEASE_STORE_PASSWORD` / `RELEASE_KEY_PASSWORD`
        # via `project.hasProperty(...)`. ORG_GRADLE_PROJECT_<name> env
        # vars surface as project properties in Gradle, so the existing
        # build script keeps working unchanged. If the script is ever
        # refactored to read from `gradle.properties` directly via
        # `Properties().load(file(...))`, this env-passing approach will
        # break — keep the two paths in sync.
        env:
          ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: natstack-mobile-${{ github.sha }}
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        # Pinned to a commit SHA (resolved from the v2 tag at audit time,
        # = v2.6.2) so a force-moved major tag cannot silently swap in
        # malicious action code that would have access to GITHUB_TOKEN
        # (contents: write) and could tamper with the release artifact.
        # Refresh via Dependabot.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: apps/mobile/android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
