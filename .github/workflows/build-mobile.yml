name: Build Mobile APK

on:
  push:
    branches: [main]
    tags: ['mobile-v*']
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/rpc/**'
      - 'packages/shared/**'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-mobile-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-mobile-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: pnpm install

      - name: Link node_modules for Gradle
        run: |
          # Gradle resolves node_modules from apps/mobile/android/ via
          # settings.gradle path: ../node_modules = apps/mobile/node_modules/
          # pnpm hoisted may not put all deps there, so symlink to root.
          if [ ! -L apps/mobile/node_modules ]; then
            rm -rf apps/mobile/node_modules
            ln -s ../../node_modules apps/mobile/node_modules
          fi

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Set up release signing
        id: signing
        if: github.event_name != 'pull_request' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > apps/mobile/android/app/release.keystore
          echo "RELEASE_STORE_FILE=release.keystore" >> apps/mobile/android/gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> apps/mobile/android/gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> apps/mobile/android/gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> apps/mobile/android/gradle.properties

      - name: Build APK
        working-directory: apps/mobile/android
        run: |
          if [ "${{ steps.signing.outcome }}" = "success" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            echo "No release keystore configured, building debug APK"
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: natstack-mobile-${{ github.sha }}
          path: |
            apps/mobile/android/app/build/outputs/apk/release/*.apk
            apps/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
